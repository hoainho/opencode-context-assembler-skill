name: github-connector
source: github
version: 1.0.0
description: |
  Pulls GitHub PR + linked-issue context for bug-fix / feature / review tasks.
  Primary: github_get_pull_request + github_get_pull_request_files.
  Empty fallback: github_search_code with intent keywords.
  Unavailable: emits gap entry.
task_types:
  - bug-fix
  - feature
  - review
mcp:
  primary: github_get_pull_request
  empty_fallback: github_search_code
  unavailable_fallback: gap-emit
query_template:
  primary: '{ "owner": "{owner}", "repo": "{repo}", "pull_number": {number} }'
  empty_fallback: '{ "q": "{intent_keywords} in:file repo:{owner}/{repo}", "per_page": 10 }'
timeout_ms: 15000
rate_limit_per_minute: 30
evidence_quality:
  primary: verified
  empty_fallback: degraded
  unavailable_fallback: partial
