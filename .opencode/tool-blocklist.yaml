blocklist:
  - 'rm\s+-rf\s+/'
  - 'rm\s+-rf\s+~'
  - 'rm\s+-rf\s+\*'
  - 'DROP\s+TABLE\b'
  - 'DROP\s+DATABASE\b'
  - 'TRUNCATE\s+TABLE\b'
  - 'TRUNCATE\s+DATABASE\b'
  - 'DELETE\s+FROM\s+\w+\s*;'
  - 'git\s+push\s+(-f|--force|--force-with-lease)\b'
  - 'git\s+reset\s+--hard\s+origin'
  - 'git\s+filter-branch\b'
  - 'git\s+update-ref\s+-d\b'
  - '>\s*/dev/sd[a-z]'
  - '>\s*/dev/null\s*2>&1\s*&'
  - 'mkfs\b'
  - 'dd\s+if=.*of=/dev/'
  - 'chmod\s+-R\s+777\s+/'
  - ':\(\)\{\s*:\|:&\s*\};:'
